[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pa-core"
version = "0.1.0"
description = "Core schemas and deterministic computation contracts for PA Quantitative."
requires-python = ">=3.11"
dependencies = [
    "numba>=0.64,<0.65",
    "numpy>=2.4,<2.5",
    "pyarrow>=23.0,<24",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
